name: Publish to GitHub Packages and Releases

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'  # Trigger on version tags (e.g., v1.0.0)
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  docker-publish:
    name: Build & Publish Docker Image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ github.repository }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-executables:
    name: Build Native Executables
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: SystemMonitor-linux
          - os: windows-latest
            asset_name: SystemMonitor-windows.exe
          - os: macos-latest
            asset_name: SystemMonitor-macos
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          
      - name: Build with PyInstaller
        # Call the Python script we created to handle the cross-platform pathing logic
        run: python build_exe.py ${{ matrix.asset_name }}
          
      - name: Upload Binary as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}*

  release:
    name: Create GitHub Release
    needs: build-executables
    runs-on: ubuntu-latest
    # Only run release if it was triggered by a tag push
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
          
      - name: Release to GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: |
            output/SystemMonitor-linux/SystemMonitor-linux
            output/SystemMonitor-windows.exe/SystemMonitor-windows.exe
            output/SystemMonitor-macos/SystemMonitor-macos
